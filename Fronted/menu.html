<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>

    <div class="logo">
        Ready!
    </div>

    <nav>
        <a href="index.html">Inicio</a>
        <a href="menu.html">Menú</a>
        <a href="pedidos.html">Pedidos</a>
        <a href="contacto.html">Contacto</a>
    </nav>

</header>

<main class="menu-container">

    <section class="productos">

        <div class="card">
            <img src="img/hamburguesa.webp">

            <h3>Hamburguesa</h3>

            <p>S/. 12.00</p>

            <button>Agregar</button>
        </div>

        <div class="card">
            <img src="img/pizza.png!sw800">

            <h3>Pizza</h3>

            <p>S/. 18.00</p>

            <button>Agregar</button>
        </div>

        <div class="card">
            <img src="img/bebida.png">

            <h3>Bebida</h3>

            <p>S/. 5.00</p>

            <button>Agregar</button>
        </div>

        <div class="card">
            <img src="img/papas.png!w700wp">

            <h3>Papas Fritas</h3>

            <p>S/. 7.00</p>

            <button>Agregar</button>
        </div>

    </section>

    <aside class="carrito">

    <h2>🛒 Mi Carrito</h2>

    <div class="item-carrito">

        <div>
            <h4>Hamburguesa</h4>
            <p>S/. 12.00</p>
        </div>

        <span>1x</span>

    </div>

    <div class="item-carrito">

        <div>
            <h4>Pizza</h4>
            <p>S/. 18.00</p>
        </div>

        <span>1x</span>

    </div>

    <div class="linea"></div>

    <div class="total">

        <h3>Total</h3>

        <h3>S/. 30</h3>

    </div>

    <button class="finalizar">
        Finalizar Pedido
    </button>

</aside>

</main>

<footer>
    <p>© 2026 Ready!</p>
</footer>

</body>
</html>
